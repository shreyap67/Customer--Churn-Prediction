[theme]
base = "dark"
backgroundColor = "#080C1A"
secondaryBackgroundColor = "#0D1224"
primaryColor = "#4F8EF7"
textColor = "#E2E8F0"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false
